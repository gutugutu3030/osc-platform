name: Release CLI Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: osc-adapter-webui/frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        id: release-version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Release tags must match vX.Y.Z: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      - name: Sync release version to main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git fetch origin main

          main_head=$(git rev-parse origin/main)
          if [[ "$GITHUB_SHA" != "$main_head" ]]; then
            echo "Release tags must point at origin/main HEAD." >&2
            echo "tag commit:  $GITHUB_SHA" >&2
            echo "main commit: $main_head" >&2
            exit 1
          fi

          git checkout -B main origin/main

          sed -i.bak -E "s/^projectVersion=.*/projectVersion=${{ steps.release-version.outputs.version }}/" gradle.properties
          rm gradle.properties.bak

          ./gradlew syncVersion --no-daemon

          if git diff --quiet -- gradle.properties README.md feature.md sample/kotlin-quickstart-loopback/README.md; then
            echo "Release version is already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties README.md feature.md sample/kotlin-quickstart-loopback/README.md
          git commit -m "chore: sync release version ${{ steps.release-version.outputs.tag }}"
          git push origin HEAD:main

      - name: Run release validation tests
        run: ./gradlew :osc-adapter-cli:test :osc-adapter-mcp:test :osc-cli:test :osc-transport-udp:test :osc-adapter-webui:check --no-daemon

      - name: Verify synced version references
        run: |
          ./gradlew syncVersion --no-daemon
          git diff --exit-code -- gradle.properties README.md feature.md sample/kotlin-quickstart-loopback/README.md

      - name: Build CLI artifacts
        run: ./gradlew :osc-cli:shadowJar :osc-cli:distZip

      - name: Collect release assets
        run: |
          mkdir -p build/release-assets

          mapfile -t jar_files < <(find osc-cli/build/libs -maxdepth 1 -type f -name 'osc-cli-*.jar' ! -name '*-thin.jar' | sort)
          mapfile -t zip_files < <(find osc-cli/build/distributions -maxdepth 1 -type f -name 'osc-cli-*.zip' ! -name 'osc-cli-shadow-*.zip' | sort)

          if [[ "${#jar_files[@]}" -ne 1 ]]; then
            echo "Expected exactly one fat jar, found ${#jar_files[@]}" >&2
            printf '%s\n' "${jar_files[@]}" >&2
            exit 1
          fi

          if [[ "${#zip_files[@]}" -ne 1 ]]; then
            echo "Expected exactly one distribution zip, found ${#zip_files[@]}" >&2
            printf '%s\n' "${zip_files[@]}" >&2
            exit 1
          fi

          cp "${jar_files[0]}" build/release-assets/
          cp "${zip_files[0]}" build/release-assets/
          ls -1 build/release-assets

      - name: Smoke test release artifacts
        run: |
          mapfile -t jar_files < <(find build/release-assets -maxdepth 1 -type f -name 'osc-cli-*.jar' | sort)
          mapfile -t zip_files < <(find build/release-assets -maxdepth 1 -type f -name 'osc-cli-*.zip' | sort)

          java -jar "${jar_files[0]}" --version

          tmp_dir=$(mktemp -d)
          trap 'rm -rf "$tmp_dir"' EXIT
          unzip -q "${zip_files[0]}" -d "$tmp_dir"

          mapfile -t cli_bins < <(find "$tmp_dir" -type f -path '*/bin/osc-cli' | sort)
          if [[ "${#cli_bins[@]}" -ne 1 ]]; then
            echo "Expected exactly one extracted CLI binary, found ${#cli_bins[@]}" >&2
            printf '%s\n' "${cli_bins[@]}" >&2
            exit 1
          fi

          "${cli_bins[0]}" --version

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: osc-cli-artifacts-${{ github.ref_name || github.sha }}
          path: build/release-assets/*

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              build/release-assets/* \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              build/release-assets/* \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
