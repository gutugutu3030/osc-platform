name: Release CLI Jar

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build executable jar
        run: ./gradlew :osc-cli:shadowJar

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: osc-cli-jar-${{ github.ref_name || github.sha }}
          path: osc-cli/build/libs/osc-cli-*.jar

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" osc-cli/build/libs/osc-cli-*.jar --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              osc-cli/build/libs/osc-cli-*.jar \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
