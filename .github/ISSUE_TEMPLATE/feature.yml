name: 機能拡張（修正）
description: 新機能の追加または既存機能の修正を依頼するためのテンプレート
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: background
    attributes:
      label: 背景
      description: この機能を追加・修正する理由や背景を説明してください
      placeholder: 例：ユーザーが〇〇できないため、△△を追加したい
    validations:
      required: true

  - type: textarea
    id: feature-request
    attributes:
      label: 実装して欲しい機能
      description: 追加・修正して欲しい機能を具体的に記述してください
      placeholder: |
        例：
        - 入力フィールドを表示する
        - ボタンをクリックするとAPIを呼び出す
        - レスポンスを画面に表示する
    validations:
      required: true

  - type: textarea
    id: restrictions
    attributes:
      label: 禁止事項
      description: 実装にあたって行ってはいけないことを記述してください
      placeholder: |
        例：
        - 不要なライブラリの追加
        - 大規模リファクタ
        - APIキーのフロント露出
    validations:
      required: false

  - type: checkboxes
    id: breaking-changes
    attributes:
      label: 破壊的変更
      description: 既存の動作・インターフェースを壊す変更を許可するかどうか
      options:
        - label: 破壊的変更を許可する
