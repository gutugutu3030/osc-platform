name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/slides/**"
      - ".github/workflows/deploy-slides-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build HTML slide
        run: |
          npx -y @marp-team/marp-cli@latest \
            docs/slides/slides.md \
            --html \
            -o site/index.html

      - name: Build PDF slide
        run: |
          npx -y @marp-team/marp-cli@latest \
            docs/slides/slides.md \
            --pdf \
            --allow-local-files \
            -o site/slides.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
