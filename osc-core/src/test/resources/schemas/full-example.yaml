messages:
  - path: /light/color
    description: RGB カラーを設定する
    args:
      - name: r
        kind: scalar
        type: int
      - name: g
        kind: scalar
        type: int
      - name: b
        kind: scalar
        type: int
  - path: /mesh/points
    description: XYZ 座標点群を設定する
    args:
      - name: pointCount
        kind: scalar
        type: int
        role: length
      - name: points
        kind: array
        lengthFrom: pointCount
        items:
          kind: tuple
          fields:
            - name: x
              type: int
            - name: y
              type: int
            - name: z
              type: float
  - path: /transform/matrix
    description: 4x4 変換行列を設定する（列優先、16 要素）
    args:
      - name: matrix
        kind: array
        length: 16
        items:
          kind: scalar
          type: float
  - path: /audio/levels
    description: チャンネルごとの音量レベルを設定する（0.0〜1.0）
    args:
      - name: channelCount
        kind: scalar
        type: int
        role: length
      - name: levels
        kind: array
        lengthFrom: channelCount
        items:
          kind: scalar
          type: float
  - path: /scene/objects
    description: ラベルと表示状態を持つシーンオブジェクト一覧を設定する
    args:
      - name: objectCount
        kind: scalar
        type: int
        role: length
      - name: objects
        kind: array
        lengthFrom: objectCount
        items:
          kind: tuple
          fields:
            - name: id
              type: int
            - name: label
              type: string
            - name: visible
              type: bool
  - path: /device/info
    description: デバイスのメタ情報（ID・接続状態・ファームウェアバージョン）
    args:
      - name: deviceId
        kind: scalar
        type: string
      - name: connected
        kind: scalar
        type: bool
      - name: firmwareVersion
        kind: scalar
        type: string
  - path: /data/chunk
    description: インデックス付きのバイナリデータチャンクを送信する
    args:
      - name: chunkIndex
        kind: scalar
        type: int
      - name: payload
        kind: scalar
        type: blob
bundles:
  - name: LightBundle
    description: 照明関連メッセージのバンドル
    messages:
      - ref: /light/color
  - name: SceneBundle
    description: 3D シーン管理メッセージのバンドル
    messages:
      - ref: /mesh/points
      - ref: /transform/matrix
      - ref: /scene/objects
