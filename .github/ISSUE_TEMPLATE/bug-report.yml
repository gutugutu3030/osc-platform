name: Copilot Bug Fix
description: Copilot に bug 修正を依頼するためのテンプレート
title: "[Copilot Bug] "
labels:
  - bug
  - copilot
body:
  - type: markdown
    attributes:
      value: |
        背景、修正内容、非目標を短く具体的に書いてください。

        基本ルールは repository instructions で適用されます。例外だけを書いてください。

  - type: dropdown
    id: target-modules
    attributes:
      label: 対象モジュール
      description: 修正対象を選んでください。複数選択可です。
      multiple: true
      options:
        - osc-core
        - osc-transport-udp
        - osc-adapter-cli
        - osc-adapter-mcp
        - osc-adapter-webui
        - osc-cli
        - osc-codegen
        - osc-gradle-plugin
        - sample
        - docs/slides
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景
      description: 何が起きているか、期待との差分を書いてください。
      placeholder: |
        例:
        - UDP 受信はできるが CLI の doc 生成だけ失敗する
        - 特定 schema だけ codegen が落ちる
    validations:
      required: true

  - type: textarea
    id: requested-change
    attributes:
      label: 修正してほしいこと
      description: 修正してほしい内容を箇条書きで書いてください。
      placeholder: |
        例:
        - 再現する原因を特定して修正する
        - 回帰テストを追加する
        - 関連 README の説明も直す
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: やらないこと
      description: 今回含めないことを箇条書きで書いてください。
      placeholder: |
        例:
        - ついでの大規模 refactor はしない
        - CLI UX 全体の見直しは含めない
        - 新機能追加は行わない
    validations:
      required: true

  - type: checkboxes
    id: optional-flags
    attributes:
      label: 追加で依頼したいこと
      description: 必要なものだけ選んでください。
      options:
        - label: 再現手順を README や sample に反映してほしい
        - label: slides または feature.md の更新も検討してほしい
        - label: CLI の実行例やスモーク確認まで行ってほしい
        - label: 既存 API / schema 互換性を優先してほしい

  - type: checkboxes
    id: breaking-change
    attributes:
      label: 破壊的変更
      description: 許容する場合だけ選んでください。
      options:
        - label: この修正は破壊的変更を含んでもよい

  - type: textarea
    id: additional-context
    attributes:
      label: 補足情報
      description: 再現条件、ログ、関連 issue、例外ルールがあれば書いてください。
      placeholder: |
        例:
        - 再現手順
        - 関連 issue: #123
        - ログ断片
    validations:
      required: false